<article class="event-card" [ngClass]="[event.type, event.hasOptimizationConflict ? 'conflict-candidate' : '']" cdkDrag [cdkDragData]="event" (click)="onSelect()">
  <header>
    <h4>
      {{ event.title }}
      @if (event.hasOptimizationConflict) {
        <span class="conflict-icon" title="Blocking a better schedule option">⚠</span>
      }
    </h4>
    <button type="button" (click)="onRemove($event)">x</button>
  </header>
  <p>{{ event.startTime }} - {{ event.endTime }}</p>
  @if (event.previousDay !== undefined) {
    <p class="previous-day">previously on {{ dayLabels[event.previousDay] }}</p>
  }
</article>
