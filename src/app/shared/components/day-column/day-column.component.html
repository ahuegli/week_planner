<section class="day-column" [class.is-today]="isToday">
  <h3 class="day-header">
    {{ dayLabel }}
    @if (isToday) {
      <span class="today-badge">Today</span>
    }
  </h3>
  <div class="exhaustion-row">
    <label>Fatigue</label>
    <input
      type="number"
      [value]="exhaustion"
      min="0"
      max="10"
      step="1"
      (change)="onExhaustionChange($event.target.value)"
    />
  </div>
  <div
    class="drop-zone"
    cdkDropList
    [id]="listId"
    [cdkDropListConnectedTo]="connectedDropLists"
    [cdkDropListData]="events"
    (cdkDropListDropped)="onDrop($event)"
  >
    <!-- Time slot grid lines -->
    <div class="time-grid">
      @for (hour of timeSlots; track hour) {
        <div class="time-slot-line"></div>
      }
    </div>

    <!-- Events positioned on the grid -->
    @for (event of events; track event.id) {
      <app-draggable-event
        class="positioned-event"
        [event]="event"
        [style.top.px]="getEventTop(event)"
        [style.height.px]="getEventHeight(event)"
        (remove)="onRemove($event)"
        (select)="onSelect($event)"
      ></app-draggable-event>
    }
  </div>
</section>
