@if (isOpen) {
  <div class="dialog-overlay" (click)="onOverlayClick()">
    <div class="dialog workout-template-dialog" (click)="stopPropagation($event)">
      <div class="dialog-header">
        <h2>Edit Workout Template</h2>
        <button type="button" class="button-icon close-btn" (click)="close()">
          ✕
        </button>
      </div>

      <div class="dialog-content workout-template-content">
        <div class="form-group">
          <label for="editWorkoutName">Session Name</label>
          <input
            id="editWorkoutName"
            type="text"
            [value]="workoutEditDraft().name"
            (input)="updateField('name', $any($event.target).value)"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="editWorkoutType">Workout Type</label>
          <select
            id="editWorkoutType"
            [value]="workoutEditDraft().workoutType"
            (input)="updateField('workoutType', $any($event.target).value)"
            class="form-select"
          >
            @for (option of workoutTypeOptions; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        </div>

        <div class="form-grid-two">
          <div class="form-group">
            <label for="editWorkoutDuration">Duration (mins)</label>
            <input
              id="editWorkoutDuration"
              type="number"
              min="15"
              step="5"
              [value]="workoutEditDraft().duration"
              (input)="updateField('duration', +$any($event.target).value)"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label for="editWorkoutFrequency">Frequency (sessions/week)</label>
            <input
              id="editWorkoutFrequency"
              type="number"
              min="1"
              max="7"
              step="1"
              [value]="workoutEditDraft().frequencyPerWeek"
              (input)="updateField('frequencyPerWeek', +$any($event.target).value)"
              class="form-input"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="editWorkoutDistance">Distance (km, optional)</label>
          <input
            id="editWorkoutDistance"
            type="number"
            min="0"
            step="0.5"
            [value]="workoutEditDraft().distanceKm ?? ''"
            (input)="updateField('distanceKm', $any($event.target).value ? +$any($event.target).value : undefined)"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="editWorkoutNotes">Notes</label>
          <textarea
            id="editWorkoutNotes"
            rows="3"
            [value]="workoutEditDraft().notes"
            (input)="updateField('notes', $any($event.target).value)"
            class="form-input"
            placeholder="Optional notes for this workout"
          ></textarea>
        </div>

        <label class="workout-preset-checkbox">
          <input
            type="checkbox"
            [checked]="addAsPreset()"
            (change)="addAsPreset.set($any($event.target).checked)"
          />
          <span>Add as preset</span>
        </label>
      </div>

      <div class="dialog-footer workout-template-footer">
        <button type="button" class="button-danger" (click)="delete(); close()">
          Delete Workout
        </button>
        <div class="dialog-footer-actions">
          <button type="button" class="button-secondary" (click)="close()">
            Cancel
          </button>
          <button type="button" class="button-primary" (click)="save()">
            Save Changes
          </button>
        </div>
      </div>
    </div>
  </div>
}
