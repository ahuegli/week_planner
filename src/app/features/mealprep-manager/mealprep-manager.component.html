<section class="panel">
  <div class="header">
    <h2>🍽️ Meal Prep</h2>
    <button type="button" (click)="onToggleForm()" class="add-btn">
      {{ showForm() ? '✕' : '+ Add' }}
    </button>
  </div>

  @if (showForm()) {
    <form class="form" (ngSubmit)="onAddMealPrepSession()">
      <div class="form-group">
        <label for="mealPrepName">Session Name</label>
        <input
          id="mealPrepName"
          name="mealPrepName"
          [ngModel]="formData().name"
          (ngModelChange)="formData.update(c => ({ ...c, name: $event }))"
          placeholder="e.g. Sunday prep"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="mealPrepDuration">Duration (min)</label>
          <input
            id="mealPrepDuration"
            type="number"
            name="mealPrepDuration"
            [ngModel]="formData().duration"
            (ngModelChange)="formData.update(c => ({ ...c, duration: $event ? +$event : 0 }))"
            min="30"
            step="15"
            required
          />
        </div>
        <div class="form-group">
          <label for="mealPrepFrequency">Times/week</label>
          <input
            id="mealPrepFrequency"
            type="number"
            name="mealPrepFrequency"
            [ngModel]="formData().frequencyPerWeek"
            (ngModelChange)="formData.update(c => ({ ...c, frequencyPerWeek: $event ? +$event : 0 }))"
            min="1"
            max="7"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="mealPrepDaysPrepped"># days prepped for</label>
        <input
          id="mealPrepDaysPrepped"
          type="number"
          name="mealPrepDaysPrepped"
          [ngModel]="formData().daysPreppedFor"
          (ngModelChange)="formData.update(c => ({ ...c, daysPreppedFor: $event ? +$event : 0 }))"
          min="1"
          max="7"
          required
        />
      </div>

      <div class="form-actions">
        <button type="submit" class="save-btn">Add</button>
        <button type="button" class="cancel-btn" (click)="showForm.set(false)">Cancel</button>
      </div>
    </form>
  }

  <div
    id="mealprep-palette"
    class="palette"
    cdkDropList
    [cdkDropListConnectedTo]="dayDropListIds"
    [cdkDropListSortingDisabled]="true"
  >
    @for (session of mealPrepSessions; track session.id) {
      <div class="chip mealprep-chip" cdkDrag [cdkDragData]="createDragData(session)">
        <div class="mealprep-session-info">
          <strong>{{ session.name }}</strong>
          <span>{{ session.duration }}m × {{ session.frequencyPerWeek }}/w</span>
        </div>
        <button 
          type="button" 
          class="delete-btn" 
          (click)="$event.stopPropagation(); onDeleteMealPrepSession(session.id)"
          title="Delete"
        >✕</button>
      </div>
    }
  </div>
</section>
