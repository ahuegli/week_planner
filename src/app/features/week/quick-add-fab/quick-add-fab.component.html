<button type="button" class="fab" aria-label="Quick add event" (click)="openSheet()">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 5v14" />
    <path d="M5 12h14" />
  </svg>
</button>

@if (isOpen()) {
  <div class="sheet-overlay" (click)="closeSheet()" role="presentation" aria-hidden="true"></div>
  <div class="sheet" role="dialog" aria-modal="true" aria-label="Quick add options">
    <div class="sheet-handle" aria-hidden="true"></div>
    <button type="button" class="sheet-option" (click)="choose('shift')">
      <span class="dot dot-shift"></span>
      <span>Add Work Shift</span>
    </button>
    <button type="button" class="sheet-option" (click)="choose('workout')">
      <span class="dot dot-workout"></span>
      <span>Add Workout</span>
    </button>
    <button type="button" class="sheet-option" (click)="choose('personal')">
      <span class="dot dot-personal"></span>
      <span>Add Personal Event</span>
    </button>
    <button type="button" class="sheet-option" (click)="choose('mealprep')">
      <span class="dot dot-mealprep"></span>
      <span>Add Meal Prep</span>
    </button>
    <button type="button" class="sheet-option sheet-option-cancel" (click)="closeSheet()">Cancel</button>
  </div>
}

<app-event-detail-modal
  [open]="modalOpen()"
  [event]="draftEvent()"
  mode="create"
  (closeRequested)="onModalClose()"
  (saveRequested)="onModalSave($event)"
/>
