<section class="panel">
  <h2>Workouts</h2>
  <form (ngSubmit)="onAddWorkout()">

    <select name="workoutType" [(ngModel)]="workoutType" (ngModelChange)="onTypeChange()">
      @for (option of workoutTypeOptions; track option.value) {
        <option [value]="option.value">{{ option.label }}</option>
      }
    </select>

    <input
      name="name"
      [(ngModel)]="name"
      placeholder="Session name (e.g. Morning run)"
    />

    <div class="row">
      <input
        type="number"
        name="duration"
        [(ngModel)]="duration"
        min="15"
        step="15"
        placeholder="Duration (min)"
      />
      <input
        type="number"
        name="frequency"
        [(ngModel)]="frequencyPerWeek"
        min="1"
        max="14"
        placeholder="Times / week"
      />
    </div>

    @if (isEndurance) {
      <input
        type="number"
        name="distanceKm"
        [(ngModel)]="distanceKm"
        min="0"
        step="0.5"
        placeholder="Distance (km) — optional"
      />
    }

    <button type="submit">Add workout</button>
  </form>

  <div
    id="workout-palette"
    class="palette"
    cdkDropList
    [cdkDropListConnectedTo]="dayDropListIds"
    [cdkDropListSortingDisabled]="true"
  >
    @for (workout of workouts; track workout.id) {
      <article cdkDrag [cdkDragData]="createDragData(workout)">
        <div class="workout-info">
          <strong>{{ workout.name }}</strong>
          <span>{{ workout.duration }} min x {{ workout.frequencyPerWeek }}/week</span>
          @if (workout.distanceKm) {
            <span>{{ workout.distanceKm }} km</span>
          }
        </div>
        <button
          type="button"
          class="delete-btn"
          (click)="$event.stopPropagation(); onDeleteWorkout(workout.id)"
        >✕</button>
      </article>
    }
  </div>
</section>
