@if (!dismissed()) {
  <div class="reminder-card" role="note" aria-label="Smart reminder">
    <span class="reminder-icon" aria-hidden="true">
      <!-- backpack / gear bag icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 10a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/>
        <path d="M9 6V4a3 3 0 0 1 6 0v2"/>
        <path d="M8 21v-5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v5"/>
        <path d="M8 10h8"/>
      </svg>
    </span>
    <p class="reminder-text">{{ text() }}</p>
    <button class="reminder-dismiss" (click)="dismiss()" aria-label="Dismiss reminder" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
}
