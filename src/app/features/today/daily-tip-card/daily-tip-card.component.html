<button
  class="tip-card"
  [class.is-expanded]="expanded()"
  (click)="toggle()"
  type="button"
  attr.aria-expanded="{{ expanded() }}"
  aria-label="Daily tip — tap to expand"
>
  <div class="tip-header">
    <span class="tip-icon" aria-hidden="true">
      <!-- lightbulb icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/>
        <path d="M9 18h6"/>
        <path d="M10 22h4"/>
      </svg>
    </span>
    <div class="tip-text">
      <span class="tip-title">{{ tip().title }}</span>
      <span class="tip-summary">{{ tip().summary }}</span>
    </div>
    <span class="tip-chevron" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 9 6 6 6-6"/>
      </svg>
    </span>
  </div>
  <div class="tip-detail-wrap" [class.is-open]="expanded()">
    <p class="tip-detail">{{ tip().detail }}</p>
    <span class="tip-learn">Learn more</span>
  </div>
</button>
