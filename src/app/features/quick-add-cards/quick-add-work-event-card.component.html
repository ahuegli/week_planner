<div class="quick-add-overlay" (click)="onCancel()">
  <div class="card-container work-shift-card" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
    <div class="card-header">
      <h3>📅 Add Work Shift</h3>
      <button type="button" class="close-btn" (click)="onCancel()">✕</button>
    </div>

    @if (presetDayLabel) {
      <div class="target-day-chip">Scheduling for {{ presetDayLabel }}</div>
    }

    <form (ngSubmit)="onAdd()" class="card-form">
    <!-- Shift Title -->
    <div class="form-group">
      <label for="shiftTitle">Shift Title</label>
      <input
        id="shiftTitle"
        type="text"
        [value]="title()"
        (input)="title.set($any($event.target).value)"
        name="title"
        placeholder="e.g. Morning Shift"
        class="form-input"
      />
    </div>

    <!-- Start Time -->
    <div class="form-group">
      <label for="startTime">Start Time</label>
      <input
        id="startTime"
        type="time"
        [value]="startTime()"
        (input)="startTime.set($any($event.target).value)"
        name="startTime"
        class="form-input"
      />
    </div>

    <!-- End Time -->
    <div class="form-group">
      <label for="endTime">End Time</label>
      <input
        id="endTime"
        type="time"
        [value]="endTime()"
        (input)="endTime.set($any($event.target).value)"
        name="endTime"
        class="form-input"
      />
    </div>

    <!-- Commute -->
    <div class="form-group">
      <label for="commute">Commute (minutes)</label>
      <input
        id="commute"
        type="number"
        [value]="commute()"
        (input)="commute.set(+$any($event.target).value)"
        name="commute"
        min="0"
        max="180"
        step="5"
        class="form-input"
      />
    </div>

    <!-- Sleep Schedule -->
    <div class="form-group sleep-schedule-group">
      <label>Sleep Schedule (Optional)</label>
      <div class="sleep-time-inputs">
        <div class="time-input-wrapper">
          <label for="bedtime" class="time-label">Bedtime</label>
          <input
            id="bedtime"
            type="time"
            [value]="bedtime()"
            (input)="bedtime.set($any($event.target).value)"
            name="bedtime"
            class="form-input sleep-input"
          />
        </div>
        <div class="time-input-wrapper">
          <label for="wakeTime" class="time-label">Wake Time</label>
          <input
            id="wakeTime"
            type="time"
            [value]="wakeTime()"
            (input)="wakeTime.set($any($event.target).value)"
            name="wakeTime"
            class="form-input sleep-input"
          />
        </div>
      </div>
    </div>

    <!-- Repeat Days -->
    @if (allowRepeat) {
      <div class="form-group">
        <label>Repeat</label>
        <div class="days-grid">
          @for (day of daysOfWeek; let index = $index; track index) {
            <label class="day-checkbox">
              <input
                type="checkbox"
                [checked]="isDaySelected(index)"
                (change)="onDayToggle(index)"
              />
              <span>{{ day }}</span>
            </label>
          }
        </div>
      </div>
    }

    <!-- Actions -->
    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-primary work-btn">Add</button>
    </div>
    </form>
  </div>
</div>
