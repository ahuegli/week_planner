<div class="quick-add-overlay" (click)="onCancel()">
  <div class="card-container mealprep-card" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
    <div class="card-header">
      <h3>🍽️ Add Meal Prep</h3>
      <button type="button" class="close-btn" (click)="onCancel()">✕</button>
    </div>

    @if (presetDayLabel) {
      <div class="target-day-chip">Scheduling for {{ presetDayLabel }}</div>
    }

    <form (ngSubmit)="onAdd()" class="card-form">
      @if (!presetDayLabel) {
        <div class="form-group">
          <label for="mealPrepDay">Day</label>
          <select
            id="mealPrepDay"
            [value]="day()"
            (input)="day.set(+$any($event.target).value)"
            class="form-select"
          >
            @for (dayLabel of dayLabels; let dayIndex = $index; track dayLabel) {
              <option [value]="dayIndex">{{ dayLabel }}</option>
            }
          </select>
        </div>
      }

      <div class="form-group">
        <label for="mealPrepTitle">Title</label>
        <input
          id="mealPrepTitle"
          type="text"
          [value]="title()"
          (input)="title.set($any($event.target).value)"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="mealPrepStart">Start Time</label>
        <input
          id="mealPrepStart"
          type="time"
          [value]="startTime()"
          (input)="startTime.set($any($event.target).value)"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="mealPrepDuration">Duration (mins)</label>
        <input
          id="mealPrepDuration"
          type="number"
          [value]="duration()"
          (input)="duration.set(+$any($event.target).value)"
          min="15"
          step="15"
          class="form-input"
        />
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-primary mealprep-btn">Schedule</button>
      </div>
    </form>
  </div>
</div>
