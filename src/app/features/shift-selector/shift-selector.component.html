<section class="panel">
  <div class="header">
    <h2>⏰ Shifts</h2>
    <button type="button" (click)="onToggleForm()" class="add-btn">
      {{ showForm() ? '✕' : '+ Add' }}
    </button>
  </div>

  @if (showForm()) {
  <form class="form" (ngSubmit)="onAddCustomShift()">
    <div class="form-group">
      <label for="label">Shift Name</label>
      <input
        id="label"
        type="text"
        [(ngModel)]="formData().label"
        name="label"
        placeholder="e.g., Morning, Afternoon"
        required
      />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="startTime">Start Time</label>
        <input
          id="startTime"
          type="time"
          [(ngModel)]="formData().startTime"
          name="startTime"
          required
        />
      </div>
      <div class="form-group">
        <label for="endTime">End Time</label>
        <input
          id="endTime"
          type="time"
          [(ngModel)]="formData().endTime"
          name="endTime"
          required
        />
    </div>
    </div>

    <div class="form-group">
      <label for="commuteMinutes">Commute (minutes)</label>
      <input
        id="commuteMinutes"
        type="number"
        [(ngModel)]="formData().commuteMinutes"
        name="commuteMinutes"
        min="0"
        required
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="save-btn">{{ editingId() ? 'Update' : 'Add' }}</button>
      <button type="button" class="cancel-btn" (click)="onCancelEdit()">Cancel</button>
    </div>
  </form>
  }

  <p class="subtitle">Drag a shift onto any day.</p>
  
  <div
    id="shift-palette"
    class="palette"
    cdkDropList
    [cdkDropListConnectedTo]="dayDropListIds"
    [cdkDropListSortingDisabled]="true"
  >
    @for (customShift of customShifts; track customShift.id) {
      <div class="chip custom-shift" cdkDrag [cdkDragData]="createCustomShiftDragData(customShift)">
        <div>
          <strong>{{ customShift.label }}</strong>
          <span>{{ customShift.startTime }}-{{ customShift.endTime }}</span>
        </div>
        <div class="shift-actions">
          <button 
            type="button" 
            class="place-week-btn" 
            (click)="onPlaceWeekly(customShift)" 
            title="Place Mon-Fri"
          >
            📅
          </button>
          <button type="button" class="edit-btn" (click)="onEditShift(customShift)" title="Edit">
            ✏️
          </button>
          <button type="button" class="delete-btn" (click)="onDeleteShift(customShift.id)" title="Delete">
            ✕
          </button>
        </div>
      </div>
    }
  </div>
</section>
