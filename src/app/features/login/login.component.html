<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>🗓️ Week Planner</h1>
      <p>{{ isRegisterMode() ? 'Create your account' : 'Sign in to your account' }}</p>
    </div>

    @if (error()) {
      <div class="error-message" role="alert">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (isRegisterMode()) {
        <div class="form-group">
          <label for="name">Name (optional)</label>
          <input
            type="text"
            id="name"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            name="name"
            placeholder="Your name"
            autocomplete="name"
          />
        </div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="••••••••"
          [autocomplete]="isRegisterMode() ? 'new-password' : 'current-password'"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          {{ isRegisterMode() ? 'Creating account...' : 'Signing in...' }}
        } @else {
          {{ isRegisterMode() ? 'Create Account' : 'Sign In' }}
        }
      </button>
    </form>

    <div class="login-footer">
      <button type="button" class="toggle-mode-btn" (click)="toggleMode()">
        {{
          isRegisterMode() ? 'Already have an account? Sign in' : "Don't have an account? Register"
        }}
      </button>

      @if (!isRegisterMode()) {
        <div class="demo-section">
          <span class="divider">or</span>
          <button type="button" class="demo-btn" (click)="useDemoCredentials()">
            Use Demo Account
          </button>
          <p class="demo-hint">demo&#64;example.com / demo123</p>
        </div>
        <div class="offline-section">
          <button type="button" class="offline-btn" (click)="enterOfflineMode()">
            Continue Offline
          </button>
          <p class="offline-hint">Use without backend (data won't be saved)</p>
        </div>
      }
    </div>
  </div>
</div>
