<!-- Legend -->
<div class="calendar-legend">
  <span class="legend-item shift">
    <span class="legend-dot"></span>
    Shift
  </span>
  <span class="legend-item workout">
    <span class="legend-dot"></span>
    Workout
  </span>
  <span class="legend-item mealprep">
    <span class="legend-dot"></span>
    Meal Prep
  </span>
  <span class="legend-item custom-event">
    <span class="legend-dot"></span>
    Custom Event
  </span>
</div>

<div class="calendar-container">
  <!-- Time gutter -->
  <div class="time-gutter">
    <div class="time-gutter-header"></div>
    <div class="time-slots" #timeSlots>
      @for (slot of timeGridSlots; track slot.hour) {
        <div class="time-slot">
          <span class="time-label">{{ slot.label }}</span>
        </div>
      }
    </div>
  </div>

  <!-- Scroll wrapper for synchronized scrolling -->
  <div class="scroll-wrapper" #scrollWrapper>
    <!-- Day columns -->
    <section class="calendar-grid" #calendarGrid>
      @for (dayLabel of dayLabels; track dayLabel; let dayIndex = $index) {
        <app-day-column
          [dayIndex]="dayIndex"
          [dayLabel]="dayLabel"
          [dayDateLabel]="dayDateLabels[dayIndex] || ''"
          [events]="eventsByDay[dayIndex]"
          [connectedDropLists]="connectedDropListIds"
          [isToday]="isTodayColumn(dayIndex)"
          (eventDropped)="onDayDrop(dayIndex, $event)"
          (eventRemoved)="eventRemoved.emit($event)"
          (eventSelected)="onEventSelected($event)"
        ></app-day-column>
      }
    </section>
  </div>
</div>
