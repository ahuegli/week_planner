@if (open()) {
  <div class="modal-overlay" (click)="cancel()" role="presentation" aria-hidden="true"></div>

  <section
    class="modal-panel"
    role="dialog"
    aria-modal="true"
    aria-label="Pick a time slot"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-handle" aria-hidden="true"></div>

    <header class="modal-header">
      <div>
        <p class="modal-kicker">Schedule note</p>
        <h2 class="modal-title">When should we schedule "{{ note()?.title }}"?</h2>
      </div>

      <button type="button" class="modal-close" (click)="cancel()" aria-label="Close slot picker">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </header>

    <p class="picker-subtitle">{{ note()?.estimatedDurationMinutes }} minutes — pick a time:</p>

    <div class="slot-list" role="list">
      @for (item of displaySlots(); track item.slot.date + item.slot.startTime) {
        <button
          type="button"
          class="slot-card"
          role="listitem"
          (click)="select(item.slot)"
        >
          <span class="slot-day">{{ item.dayLabel }}</span>
          <span class="slot-date">{{ item.dateLabel }}</span>
          <span class="slot-time">{{ item.timeRange }}</span>
          <svg class="slot-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>
      }
    </div>

    <div class="modal-actions">
      <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
    </div>
  </section>
}
